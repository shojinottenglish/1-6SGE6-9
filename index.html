`;

    // 圧縮された文字列からJavaScriptのオブジェクト配列に変換
    const qData = rawData.trim().split('\n').map(line => {
      const p = line.split('|');
      if (p.length < 8) return null;
      return {
        i: p[0], s: p[1], t: p[2], 
        q: p[3].replace(/_N_/g, '\n'), 
        c: p[4] ? p[4].split('^') : [], 
        a: isNaN(p[5]) ? p[5] : parseInt(p[5], 10), 
        e: p[6].replace(/_N_/g, '\n'),
        g: p[7]
      };
    }).filter(Boolean);

    let state = {
      currentMode: 'menu', 
      questions: [],
      currentIndex: 0,
      score: 0,
      mistakes: JSON.parse(localStorage.getItem('grammarMasteryMistakes_new') || '[]'),
      progress: JSON.parse(localStorage.getItem('grammarMasteryProgress_new') || '{}'),
      currentQuizMode: null,
      isAnswered: false,
      selectedAnswer: null,
      isCorrect: false,
      constructedAnswer: '',
      availableWords: []
    };

    function setState(newState) {
      state = { ...state, ...newState };
      if (newState.mistakes !== undefined) {
        localStorage.setItem('grammarMasteryMistakes_new', JSON.stringify(state.mistakes));
      }
      if (newState.progress !== undefined) {
        localStorage.setItem('grammarMasteryProgress_new', JSON.stringify(state.progress));
      }
      render();
    }

    function getQuestionTypeLabel(type) {
      switch (type) {
        case 'c': return '四択問題（空所に適切な語を選択）';
        case 'e': return '誤り指摘問題（誤っている箇所を1つ選択）';
        case 'o': return '並べ替え問題';
        case 'f': return '穴埋め・書き換え問題';
        default: return '問題';
      }
    }

    window.startQuiz = function(mode, resume = false) {
      let targetQuestions = [];
      let currentIdx = 0;
      let currentScore = 0;

      if (resume && state.progress[mode]) {
        const prog = state.progress[mode];
        targetQuestions = prog.order.map(id => qData.find(q => q.i === id)).filter(Boolean);
        currentIdx = prog.currentIndex;
        currentScore = prog.score;
      } else {
        if (mode === 'all') {
          targetQuestions = [...qData].sort(() => Math.random() - 0.5);
        } else if (mode === 'mistakes') {
          targetQuestions = qData.filter(q => state.mistakes.includes(q.i)).sort(() => Math.random() - 0.5);
        } else {
          targetQuestions = qData.filter(q => q.s === mode).sort(() => Math.random() - 0.5);
        }

        if (targetQuestions.length === 0) return;

        state.progress[mode] = { order: targetQuestions.map(q => q.i), currentIndex: 0, score: 0 };
        localStorage.setItem('grammarMasteryProgress_new', JSON.stringify(state.progress));
      }

      const firstQ = targetQuestions[currentIdx];
      setState({
        currentMode: 'quiz',
        currentQuizMode: mode,
        questions: targetQuestions,
        currentIndex: currentIdx,
        score: currentScore,
        ...resetQuestionState(firstQ)
      });
    };

    function resetQuestionState(question) {
      return {
        isAnswered: false,
        selectedAnswer: null,
        isCorrect: false,
        constructedAnswer: '',
        availableWords: question.t === 'o' ? [...question.c].sort(() => Math.random() - 0.5) : []
      };
    }

    window.goNext = function() {
      if (state.currentIndex + 1 < state.questions.length) {
        const nextIdx = state.currentIndex + 1;
        if (state.progress[state.currentQuizMode]) {
          state.progress[state.currentQuizMode].currentIndex = nextIdx;
          state.progress[state.currentQuizMode].score = state.score;
          localStorage.setItem('grammarMasteryProgress_new', JSON.stringify(state.progress));
        }
        const nextQ = state.questions[nextIdx];
        setState({ currentIndex: nextIdx, ...resetQuestionState(nextQ) });
      } else {
        if (state.progress[state.currentQuizMode]) {
          delete state.progress[state.currentQuizMode];
          localStorage.setItem('grammarMasteryProgress_new', JSON.stringify(state.progress));
        }
        setState({ currentMode: 'result' });
      }
    };

    window.goToMenu = function() { setState({ currentMode: 'menu' }); };

    window.handleChoiceSubmit = function(choiceIndex) {
      if (state.isAnswered) return;
      const currentQ = state.questions[state.currentIndex];
      const isCorrect = (choiceIndex + 1) === currentQ.a;
      let newMistakes = [...state.mistakes];
      let newScore = state.score;

      if (isCorrect) {
        newScore += 1;
        newMistakes = newMistakes.filter(id => id !== currentQ.i);
      } else {
        if (!newMistakes.includes(currentQ.i)) newMistakes.push(currentQ.i);
      }
      setState({ isCorrect, selectedAnswer: choiceIndex + 1, isAnswered: true, score: newScore, mistakes: newMistakes });
    };

    window.handleWordClick = function(idx) {
      if (state.isAnswered) return;
      const word = state.availableWords[idx];
      setState({
        constructedAnswer: state.constructedAnswer ? state.constructedAnswer + ' ' + word : word,
        availableWords: state.availableWords.filter((_, i) => i !== idx)
      });
    };

    window.handleClearConstructed = function() {
      if (state.isAnswered) return;
      setState({ constructedAnswer: '', availableWords: [...state.questions[state.currentIndex].c].sort(() => Math.random() - 0.5) });
    };

    window.handleTextSubmit = function(submittedText) {
      if (state.isAnswered) return;
      const currentQ = state.questions[state.currentIndex];
      const normalizedSub = (submittedText || '').trim().replace(/\s+/g, ' ').toLowerCase();
      const normalizedAns = String(currentQ.a).trim().replace(/\s+/g, ' ').toLowerCase();
      const isCorrect = normalizedSub === normalizedAns;
      let newMistakes = [...state.mistakes];
      let newScore = state.score;

      if (isCorrect) {
        newScore += 1;
        newMistakes = newMistakes.filter(id => id !== currentQ.i);
      } else {
        if (!newMistakes.includes(currentQ.i)) newMistakes.push(currentQ.i);
      }
      setState({ isCorrect, selectedAnswer: submittedText, isAnswered: true, score: newScore, mistakes: newMistakes });
    };

    window.handleInputChange = function(val) {
      if (state.isAnswered) return;
      state.constructedAnswer = val;
    };

    window.handleInputKeydown = function(e, val) {
      if (e.key === 'Enter' && !state.isAnswered) handleTextSubmit(val);
    };

    function renderMenuHtml() {
      const stepNames = ['Lesson 6', 'Lesson 7', 'Review', 'Lesson 8', 'Lesson 9'];
      let stepsHtml = '';
      
      stepNames.forEach(step => {
        const p = state.progress[step];
        const hasProgress = p && p.currentIndex > 0 && p.currentIndex < p.order.length;
        const count = qData.filter(q => q.s === step).length;
        if (count === 0) return;

        stepsHtml += `
          <div class="flex flex-col relative w-full h-full">
            <button onclick="startQuiz('${step}', ${hasProgress ? 'true' : 'false'})" class="flex flex-col items-center justify-center bg-white border ${hasProgress ? 'border-blue-400 shadow-md bg-blue-50' : 'border-slate-200 hover:border-blue-400 hover:shadow-md'} text-slate-700 p-3 md:p-4 rounded-xl transition-all h-full w-full">
              <span class="font-bold text-base md:text-lg">${step}</span>
              <span class="text-xs md:text-sm mt-1 ${hasProgress ? 'text-blue-600 font-bold' : 'text-slate-400'}">
                ${hasProgress ? `続きから ${p.currentIndex}/${p.order.length}問` : `${count}問`}
              </span>
            </button>
            ${hasProgress ? `
              <button onclick="startQuiz('${step}', false)" class="absolute -top-2 -right-2 bg-white border border-slate-200 shadow-sm rounded-full p-1.5 text-slate-400 hover:text-red-500 transition-colors" title="最初からやり直す">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
              </button>
            ` : ''}
          </div>
        `;
      });

      const pAll = state.progress['all'];
      const hasAllProgress = pAll && pAll.currentIndex > 0 && pAll.currentIndex < pAll.order.length;
      const pMistakes = state.progress['mistakes'];
      const hasMistakesProgress = pMistakes && pMistakes.currentIndex > 0 && pMistakes.currentIndex < pMistakes.order.length;
      const mistakesDisabled = !hasMistakesProgress && state.mistakes.length === 0;

      return `
        <div class="flex flex-col items-center justify-center h-full p-4 md:p-8 space-y-6 md:space-y-8 fade-in">
          <div class="text-center space-y-3 md:space-y-4 mt-6 md:mt-12">
            <h1 class="text-2xl md:text-4xl font-bold text-slate-800 tracking-tight">1-6 Special EnGra 6-9</h1>
            <p class="text-sm md:text-base text-slate-500 font-medium">重要文法 厳選・完全統合版（全${qData.length}問）</p>
          </div>

          <div class="grid grid-cols-2 gap-3 md:gap-4 w-full max-w-2xl">
            <div class="flex flex-col w-full h-full col-span-2 md:col-span-1">
              <button onclick="startQuiz('all', ${hasAllProgress ? 'true' : 'false'})" class="flex flex-col items-center justify-center bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl shadow-md transition-all transform hover:scale-105 h-full w-full">
                <div class="flex items-center space-x-2 md:space-x-3">
                  <i data-lucide="play" class="w-5 h-5 md:w-6 md:h-6"></i>
                  <span class="text-base md:text-lg font-semibold">${hasAllProgress ? '全問題 (続きから)' : '全問題に挑戦'}</span>
                </div>
                <span class="text-xs md:text-sm text-blue-200 mt-1">${hasAllProgress ? `${pAll.currentIndex}/${pAll.order.length}問` : `${qData.length}問`}</span>
              </button>
              ${hasAllProgress ? `<button onclick="startQuiz('all', false)" class="mt-2 text-xs md:text-sm text-slate-500 hover:text-blue-600 underline transition-colors text-center">最初からやり直す</button>` : ''}
            </div>

            <div class="flex flex-col w-full h-full col-span-2 md:col-span-1">
              <button 
                onclick="startQuiz('mistakes', ${hasMistakesProgress ? 'true' : 'false'})" 
                ${mistakesDisabled ? 'disabled' : ''}
                class="flex flex-col items-center justify-center p-4 rounded-xl shadow-md transition-all h-full w-full ${!mistakesDisabled ? 'bg-orange-500 hover:bg-orange-600 text-white transform hover:scale-105' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}">
                <div class="flex items-center space-x-2 md:space-x-3">
                  <i data-lucide="refresh-cw" class="w-5 h-5 md:w-6 md:h-6"></i>
                  <span class="text-base md:text-lg font-semibold">${hasMistakesProgress ? '間違えた問題 (続き)' : '間違えた問題'}</span>
                </div>
                <span class="text-xs md:text-sm mt-1 opacity-80">${hasMistakesProgress ? `${pMistakes.currentIndex}/${pMistakes.order.length}問` : `${state.mistakes.length}問`}</span>
              </button>
              ${hasMistakesProgress ? `<button onclick="startQuiz('mistakes', false)" class="mt-2 text-xs md:text-sm text-slate-500 hover:text-orange-600 underline transition-colors text-center">新しく間違えたリストでやり直す</button>` : ''}
            </div>

            <div class="col-span-2 pt-4 md:pt-6 pb-1 md:pb-2 border-b border-slate-200">
              <h2 class="text-xs md:text-sm font-bold text-slate-400 uppercase tracking-wider text-center">Lesson別に出題</h2>
            </div>
            
            ${stepsHtml}
          </div>
        </div>
      `;
    }

    function renderQuizHtml() {
      const currentQ = state.questions[state.currentIndex];
      const typeLabel = getQuestionTypeLabel(currentQ.t);
      const concept = conceptGroups[currentQ.g] || { title: "解説", e: "解説がありません", m: "作問者の意図がありません" };
      
      let inputAreaHtml = '';

      if (currentQ.t === 'c' || currentQ.t === 'e') {
        let choicesHtml = '';
        currentQ.c.forEach((choiceText, idx) => {
          let btnStyle = "bg-white border-2 border-slate-200 text-slate-700 hover:border-blue-400 hover:bg-blue-50";
          if (state.isAnswered) {
            if ((idx + 1) === currentQ.a) {
              btnStyle = "bg-green-100 border-2 border-green-500 text-green-800 font-bold z-10 shadow-md"; 
            } else if (state.selectedAnswer === (idx + 1)) {
              btnStyle = "bg-red-50 border-2 border-red-300 text-red-600 line-through opacity-70"; 
            } else {
              btnStyle = "bg-slate-50 border-2 border-slate-200 text-slate-400 opacity-50"; 
            }
          }
          choicesHtml += `
            <button ${state.isAnswered ? 'disabled' : ''} onclick="handleChoiceSubmit(${idx})" class="p-3 md:p-4 rounded-xl text-left transition-all duration-200 ${btnStyle}">
              <span class="text-sm md:text-base font-medium">${choiceText}</span>
            </button>
          `;
        });
        inputAreaHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-2 md:gap-3">${choicesHtml}</div>`;
      } 
      else if (currentQ.t === 'o') {
        let constructedHtml = state.constructedAnswer.split(' ').filter(w=>w).map(w => 
          `<span class="px-3 py-1 bg-white border border-slate-200 shadow-sm rounded-lg text-slate-800 font-medium">${w}</span>`
        ).join('');
        if (!state.constructedAnswer) constructedHtml = `<span class="text-slate-400 text-sm">単語をタップして組み立ててください</span>`;

        let availableHtml = '';
        if (!state.isAnswered) {
          availableHtml = state.availableWords.map((w, i) => 
            `<button onclick="handleWordClick(${i})" class="px-3 py-1.5 bg-white border border-slate-300 hover:border-blue-500 hover:text-blue-600 rounded-lg shadow-sm transition-colors font-medium text-slate-700 text-sm md:text-base">${w}</button>`
          ).join('');
        }

        inputAreaHtml = `
          <div class="space-y-4">
            <div class="min-h-[50px] p-3 bg-slate-50 border-2 border-dashed border-slate-300 rounded-xl flex flex-wrap items-center gap-2">
              ${constructedHtml}
            </div>
            ${!state.isAnswered ? `<div class="flex flex-wrap gap-2">${availableHtml}</div>` : ''}
            ${!state.isAnswered ? `
            <div class="flex space-x-3">
              <button onclick="handleClearConstructed()" class="px-4 py-2 text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition-colors text-sm">やり直す</button>
              <button onclick="handleTextSubmit(state.constructedAnswer)" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold transition-colors flex-grow">解答する</button>
            </div>
            ` : ''}
          </div>
        `;
      } 
      else if (currentQ.t === 'f') {
        const val = state.constructedAnswer.replace(/"/g, '&quot;');
        inputAreaHtml = `
          <div class="space-y-3">
            <input type="text" id="fillInput" value="${val}" ${state.isAnswered ? 'disabled' : ''} 
              oninput="handleInputChange(this.value)" 
              onkeydown="handleInputKeydown(event, this.value)"
              placeholder="解答を入力してください" 
              class="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none text-base md:text-lg text-slate-800 bg-white" />
            ${!state.isAnswered ? `<button onclick="handleTextSubmit(document.getElementById('fillInput').value)" class="w-full p-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-colors">解答する</button>` : ''}
          </div>
        `;
      }

      let feedbackHtml = '';
      if (state.isAnswered) {
        const resultIcon = state.isCorrect 
          ? `<div class="flex items-center text-green-600"><i data-lucide="check-circle-2" class="w-6 h-6 mr-2"></i><span class="text-lg font-bold">正解！</span></div>`
          : `<div class="flex items-center text-red-600"><i data-lucide="x-circle" class="w-6 h-6 mr-2"></i><span class="text-lg font-bold">不正解...</span></div>`;
        
        let correctAnsBox = '';
        if (currentQ.t === 'o' || currentQ.t === 'f') {
          correctAnsBox = `
            <div class="mb-3 bg-white p-2 rounded-lg border border-slate-100">
              <span class="text-xs text-slate-500 block mb-1">正解:</span>
              <span class="font-mono text-sm md:text-base text-slate-800 font-bold">${currentQ.a}</span>
            </div>
          `;
        }

        const btnText = (state.currentIndex + 1 < state.questions.length) ? '次の問題へ' : '結果を見る';

        feedbackHtml = `
          <div class="mt-4 slide-in">
            <div class="p-4 md:p-5 rounded-2xl border ${state.isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}">
              <div class="flex items-center justify-between mb-3">
                ${resultIcon}
              </div>
              
              ${correctAnsBox}

              <!-- 丁寧なポイント解説 (グループ共通) -->
              <div class="bg-white rounded-xl p-3 md:p-4 border border-blue-100 shadow-sm mb-4">
                <div class="flex items-center space-x-2 mb-2">
                  <div class="p-1 md:p-1.5 bg-blue-100 text-blue-700 rounded-md"><i data-lucide="lightbulb" class="w-4 h-4 md:w-5 md:h-5"></i></div>
                  <h4 class="text-sm md:text-base font-bold text-blue-800">${concept.title}</h4>
                </div>
                <p class="text-xs md:text-sm text-slate-700 leading-relaxed font-medium">${concept.e}</p>
              </div>

              <!-- 個別解説 -->
              <div class="px-2 py-2 border-l-4 border-slate-300 mb-4 bg-slate-50 rounded-r-lg">
                <span class="text-xs text-slate-500 font-bold mb-1 block">【この問題の解説】</span>
                <p class="text-xs md:text-sm text-slate-700 whitespace-pre-line leading-relaxed">${currentQ.e}</p>
              </div>

              <!-- 作問者の意図 -->
              <div class="flex items-start space-x-2 px-2 mt-2">
                <i data-lucide="brain-circuit" class="w-4 h-4 text-orange-500 mt-0.5"></i>
                <div>
                  <h4 class="text-xs font-bold text-orange-700 mb-0.5">作問者の意図</h4>
                  <p class="text-xs text-slate-600 leading-relaxed">${concept.m}</p>
                </div>
              </div>

              <div class="mt-5 flex justify-end">
                <button onclick="goNext()" class="flex items-center px-6 py-2.5 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl shadow-md transition-transform transform hover:translate-x-1">
                  ${btnText}
                  <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
                </button>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="flex flex-col h-full p-2 md:p-4 max-w-4xl mx-auto w-full fade-in">
          <div class="flex items-center justify-between mb-3 text-xs md:text-sm font-medium text-slate-500 bg-white p-3 rounded-xl shadow-sm border border-slate-100">
            <div class="flex items-center space-x-3 md:space-x-4">
              <button onclick="goToMenu()" class="flex items-center text-slate-400 hover:text-slate-600 transition-colors" title="メニューへ戻る">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> 中断
              </button>
              <span class="flex items-center pl-3 md:pl-4 border-l border-slate-200"><i data-lucide="book-open" class="w-4 h-4 mr-1 md:mr-2 text-blue-500"></i> ${currentQ.s}</span>
            </div>
            <span>Question ${state.currentIndex + 1} / ${state.questions.length}</span>
          </div>

          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6 mb-4 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
            <div class="mb-3">
              <span class="inline-block px-2 py-1 bg-blue-50 border border-blue-200 text-blue-700 text-xs font-bold rounded-lg shadow-sm">
                ${typeLabel}
              </span>
            </div>
            <p class="text-base md:text-xl font-medium text-slate-800 leading-relaxed whitespace-pre-line">${currentQ.q}</p>
          </div>

          <div class="flex-grow">
            ${inputAreaHtml}
          </div>

          ${feedbackHtml}
        </div>
      `;
    }

    function renderResultHtml() {
      const accuracy = Math.round((state.score / state.questions.length) * 100) || 0;
      const strokeColor = accuracy >= 80 ? '#22c55e' : accuracy >= 60 ? '#f59e0b' : '#ef4444';
      const circumference = 2 * Math.PI * 45;
      const offset = circumference * (1 - accuracy / 100);

      let mistakesBtnHtml = '';
      if (state.mistakes.length > 0) {
        mistakesBtnHtml = `
          <button onclick="startQuiz('mistakes')" class="flex-1 flex items-center justify-center py-3 md:py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl shadow-md transition-colors text-sm md:text-base">
            <i data-lucide="refresh-cw" class="w-4 h-4 md:w-5 md:h-5 mr-2"></i> 間違えた問題
          </button>
        `;
      }

      return `
        <div class="flex flex-col items-center justify-center h-full p-4 md:p-8 space-y-6 md:space-y-8 fade-in mt-6 md:mt-12">
          <div class="text-center space-y-2">
            <h2 class="text-2xl md:text-3xl font-bold text-slate-800">学習完了！</h2>
            <p class="text-sm md:text-base text-slate-500">今回のスコア</p>
          </div>

          <div class="relative flex items-center justify-center w-40 h-40 md:w-48 md:h-48 bg-white rounded-full shadow-xl border-4 border-slate-50">
            <svg class="absolute w-full h-full transform -rotate-90" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" fill="none" stroke="#e2e8f0" stroke-width="8" />
              <circle cx="50" cy="50" r="45" fill="none" stroke="${strokeColor}" stroke-width="8" 
                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" 
                class="transition-all duration-1000 ease-out" />
            </svg>
            <div class="text-center">
              <span class="text-4xl md:text-5xl font-black text-slate-800">${accuracy}</span>
              <span class="text-lg md:text-xl font-bold text-slate-400">%</span>
              <div class="text-xs md:text-sm font-medium text-slate-500 mt-1">${state.score} / ${state.questions.length} 正解</div>
            </div>
          </div>

          <div class="flex space-x-3 md:space-x-4 pt-4 md:pt-8 w-full max-w-md">
            <button onclick="goToMenu()" class="flex-1 flex items-center justify-center py-3 md:py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors text-sm md:text-base">
              <i data-lucide="list-checks" class="w-4 h-4 md:w-5 md:h-5 mr-2"></i> メニュー
            </button>
            ${mistakesBtnHtml}
          </div>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById('app');
      let html = '';
      if (state.currentMode === 'menu') html = renderMenuHtml();
      else if (state.currentMode === 'quiz') html = renderQuizHtml();
      else if (state.currentMode === 'result') html = renderResultHtml();

      app.innerHTML = html;
      if (window.lucide) window.lucide.createIcons();
    }

    document.addEventListener("DOMContentLoaded", render);

  </script>
</body>
</html>
